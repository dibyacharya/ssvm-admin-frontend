apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kiit-lms-admin-frontend-ingress
  namespace: default
  annotations:
    # Azure Application Gateway or NGINX Ingress Controller annotations
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    # CORS if needed
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
spec:
  ingressClassName: nginx
  rules:
  - host: "{{INGRESS_HOST}}"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kiit-lms-admin-frontend-service
            port:
              number: 80
  # TLS configuration - uncomment and configure when certificates are available
  # tls:
  # - hosts:
  #   - "{{INGRESS_HOST}}"
  #   secretName: kiit-lms-tls-secret

