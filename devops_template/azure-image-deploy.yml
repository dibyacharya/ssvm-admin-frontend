parameters:
  - name: tag
    type: string
  - name: imageRepository
    type: string
  - name: registry_name
    type: string
  - name: acrusername
    type: string
  - name: acrpassword
    type: string
  - name: containerapp_name
    type: string
  - name: resource_group_name
    type: string
    default: 'rg-kiit-lms-dev'
  - name: google_api_key
    type: string
    default: ''
  - name: groq_api_key
    type: string
    default: ''
  
stages:
  - stage: DeployBuild
    variables:
      Build_ImageRepository: '${{ parameters.imageRepository }}'
      Build_containerapp_name: '${{ parameters.containerapp_name }}'
      Build_resource_group_name: '${{ parameters.resource_group_name }}'
      Build_google_api_key: '${{ parameters.google_api_key }}'
      Build_groq_api_key: '${{ parameters.groq_api_key }}'
    dependsOn: Build
    displayName: 'Deploy the Image'
    jobs:
      - deployment: DeployBuild 
        displayName: 'Deploy the Image'
        environment: 'dev'      
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "DEBUG (Build Job): Variables used by Docker task:"
                    echo "Dockerfile: $(Build_Dockerfile)"
                    echo "repository: $(Build_ImageRepository)"
                    echo "repository: $(Build_containerapp_name)"
                  displayName: 'Print Vars for Docker Task'
                - task: AzureCLI@2
                  displayName: 'Deploy Container App using Azure CLI'
                  inputs:
                    azureSubscription: 'kiit-it-analytics'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "Logging into ACR..."
                      echo "${{ parameters.acrpassword }}" | docker login ${{ parameters.registry_name }}.azurecr.io -u ${{ parameters.acrusername }} --password-stdin
                      echo "setting up environment variables for the container app..."
                      ENV_VARS="\
                        GOOGLE_API_KEY=\"$(Build_google_api_key)\"
                        GROQ_API_KEY=\"$(Build_groq_api_key)\""

                      echo "Dockerfile: $(Build_Dockerfile)"
                      echo "repository: $(Build_ImageRepository)"
                      echo "repository: $(Build_containerapp_name)"

                      # Get current revision before update (for rollback tracking)
                      CURRENT_REVISION=$(az containerapp revision list \
                        --name $(Build_containerapp_name) \
                        --resource-group $(Build_resource_group_name) \
                        --query "[?properties.active].name" -o tsv 2>/dev/null || echo "")
                      
                      echo "Current active revision: ${CURRENT_REVISION}"

                      echo "Deploying container app..."
                      if az containerapp show \
                          --name $(Build_containerapp_name)\
                          --resource-group $(Build_resource_group_name) \
                          --only-show-errors &>/dev/null; then
                        echo "Container app exists. Updating..."

                        az containerapp update \
                          --name $(Build_containerapp_name)\
                          --resource-group $(Build_resource_group_name) \
                          --image ${{ parameters.registry_name }}.azurecr.io/$(Build_ImageRepository):${{ parameters.tag }} \
                          --revision-suffix build-${{ parameters.tag }}

                      else
                        echo "Container app does not exist. Creating..."

                        az containerapp create \
                          --name $(Build_containerapp_name) \
                          --resource-group $(Build_resource_group_name) \
                          --environment caenv-kiit-lms-dev \
                          --image ${{ parameters.registry_name }}.azurecr.io/$(Build_ImageRepository):${{ parameters.tag }} \
                          --ingress external \
                          --target-port 3000 \
                          --registry-server ${{ parameters.registry_name }}.azurecr.io \
                          --registry-username ${{ parameters.acrusername }} \
                          --registry-password ${{ parameters.acrpassword }}\
                          --env-vars ${ENV_VARS} \
                          --revision-suffix build-${{ parameters.tag }}
                      fi

                      # Get new revision details
                      NEW_REVISION=$(az containerapp revision list \
                        --name $(Build_containerapp_name) \
                        --resource-group $(Build_resource_group_name) \
                        --query "[?properties.active].name" -o tsv | head -n 1)
                      
                      # Store deployment history for rollback
                      DEPLOYMENT_INFO=$(cat <<EOF
{
  "buildId": "${{ parameters.tag }}",
  "image": "${{ parameters.registry_name }}.azurecr.io/$(Build_ImageRepository):${{ parameters.tag }}",
  "revision": "${NEW_REVISION}",
  "previousRevision": "${CURRENT_REVISION}",
  "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
  "pipelineRunId": "$(Build.BuildId)",
  "pipelineRunUrl": "$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)",
  "environment": "$(Build_containerapp_name)"
}
EOF
)
                      
                      echo "##vso[task.setvariable variable=DeploymentInfo]$DEPLOYMENT_INFO"
                      echo "##vso[task.setvariable variable=CurrentRevision]${NEW_REVISION}"
                      echo "##vso[task.setvariable variable=PreviousRevision]${CURRENT_REVISION}"
                      
                      # Store deployment history in a file for reference
                      mkdir -p $(Pipeline.Workspace)/deployment-history
                      echo "$DEPLOYMENT_INFO" > $(Pipeline.Workspace)/deployment-history/$(Build_containerapp_name)-${{ parameters.tag }}.json
                      
                      echo "Container app deployment completed."
                      echo "New revision: ${NEW_REVISION}"
                      echo "Previous revision: ${CURRENT_REVISION}"
                      echo "Deployment info saved for rollback tracking."
