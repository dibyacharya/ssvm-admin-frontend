trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: DEV
  - name: tag
    value: '$(Build.BuildId)'
  - name: devRepo
    value: 'kiit/dev/lms/kiit_lms_admin_frontend'
  - name: uatRepo
    value: 'kiit/uat/lms/kiit_lms_admin_frontend'
  - name: prodRepo
    value: 'kiit/prod/lms/kiit_lms_admin_frontend'

########################
# BUILD (DEV REPO)
########################
stages:
  - stage: Build
    displayName: "Build Image"
    jobs:
      - template: devops_template/azure-image-build.yml
        parameters:
          containerRegistry: 'svc_acr_connection'
          imageRepository: '$(devRepo)'
          dockerfilePath: 'Dockerfile'
          tag: $(tag)

########################
# DEPLOY TO DEV
########################
  - stage: Deploy_Dev
    displayName: "Deploy to DEV"
    dependsOn: Build
    variables:
      - group: DEV
    jobs:
      - template: devops_template/azure-image-deploy.yml
        parameters:
          tag: $(tag)
          imageRepository: '$(devRepo)'
          registry_name: '$(registry_name)'
          acrusername: '$(acrusername)'
          acrpassword: '$(acrpassword)'
          containerapp_name: 'kiit-lms-admin-dev'
          # google_api_key: '$(google_api_key)'
          # groq_api_key: '$(groq_api_key)'

  - stage: Deploy_UAT
    displayName: "Promote & Deploy to UAT"
    dependsOn: Deploy_Dev
    condition: succeeded()
    
    variables:
      - group: UAT
    jobs:
      - job: PromoteImageUAT
        displayName: "Promote Image → UAT"
        environment: "UAT"

        steps:
          - task: AzureCLI@2
            displayName: "Promote Image to UAT"
            inputs:
              azureSubscription: 'kiit-it-analytics'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Promoting image from DEV to UAT..."
                az acr import \
                  --name $(registry_name) \
                  --source $(registry_name).azurecr.io/$(devRepo):$(tag) \
                  --image $(uatRepo):$(tag)

      - deployment: DeployUAT
        displayName: "Deploy to UAT"

        steps:
          - template: devops_template/azure-image-deploy.yml
            parameters:
              tag: $(tag)
              imageRepository: '$(uatRepo)'
              registry_name: '$(registry_name)'
              acrusername: '$(acrusername)'
              acrpassword: '$(acrpassword)'
              containerapp_name: 'kiit-lms-admin-uat'

  - stage: Deploy_Prod
    displayName: "Promote & Deploy to PROD"
    dependsOn: Deploy_UAT
    condition: succeeded()

    variables:
      - group: PROD

    jobs:
      - job: PromoteImageProd
        displayName: "Promote Image → PROD"

        steps:
          - task: AzureCLI@2
            displayName: "Promote Image to PROD"
            inputs:
              azureSubscription: 'kiit-it-analytics'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Promoting image from UAT to PROD..."
                az acr import \
                  --name $(registry_name) \
                  --source $(registry_name).azurecr.io/$(uatRepo):$(tag) \
                  --image $(prodRepo):$(tag)

      - deployment: DeployProd
        displayName: "Deploy to PROD (Container Apps)"
        environment: "PROD"

        steps:
          - template: devops_template/azure-image-deploy.yml
            parameters:
              tag: $(tag)
              imageRepository: '$(prodRepo)'
              registry_name: '$(registry_name)'
              acrusername: '$(acrusername)'
              acrpassword: '$(acrpassword)'
              containerapp_name: 'kiit-lms-admin-prod'

########################
# DEPLOY TO KUBERNETES (PROD ONLY)
########################
  - stage: Deploy_K8s_Prod
    displayName: "Deploy to Kubernetes (PROD)"
    dependsOn: Deploy_Prod
    condition: succeeded()
    variables:
      - group: PROD
    jobs:
      - template: devops_template/azure-k8s-deploy.yml
        parameters:
          tag: $(tag)
          imageRepository: '$(prodRepo)'
          registry_name: '$(registry_name)'
          acrusername: '$(acrusername)'
          acrpassword: '$(acrpassword)'
          k8s_cluster_name: '$(k8s_cluster_name)'
          k8s_resource_group: '$(k8s_resource_group)'
          ingress_host: '$(k8s_ingress_host)'
          environment: 'prod'
          api_base_url: '$(api_base_url)'