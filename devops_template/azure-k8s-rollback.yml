parameters:
  - name: k8s_cluster_name
    type: string
  - name: k8s_resource_group
    type: string
  - name: namespace
    type: string
    default: 'default'
  - name: deployment_name
    type: string
    default: 'kiit-lms-admin-frontend'
  - name: revision_number
    type: string
    default: ''  # If empty, will rollback to previous revision
  - name: build_id
    type: string
    default: ''  # Optional: rollback to specific build ID

stages:
  - stage: RollbackK8s
    displayName: 'Rollback Kubernetes Deployment'
    jobs:
      - deployment: RollbackK8s
        displayName: 'Rollback Kubernetes Deployment'
        environment: 'rollback'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: 'Get AKS Credentials'
                  inputs:
                    azureSubscription: 'kiit-it-analytics'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "Getting AKS credentials..."
                      az aks get-credentials \
                        --resource-group ${{ parameters.k8s_resource_group }} \
                        --name ${{ parameters.k8s_cluster_name }} \
                        --overwrite-existing
                      
                      echo "Verifying kubectl connection..."
                      kubectl cluster-info

                - task: AzureCLI@2
                  displayName: 'List Deployment History'
                  inputs:
                    azureSubscription: 'kiit-it-analytics'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "Listing deployment history for ${{ parameters.deployment_name }}..."
                      kubectl rollout history deployment/${{ parameters.deployment_name }} -n ${{ parameters.namespace }} || echo "No deployment history found"
                      
                      echo ""
                      echo "Current deployment details:"
                      kubectl get deployment ${{ parameters.deployment_name }} -n ${{ parameters.namespace }} -o jsonpath='{.metadata.annotations}' | jq '.' || kubectl get deployment ${{ parameters.deployment_name }} -n ${{ parameters.namespace }} -o yaml

                - task: AzureCLI@2
                  displayName: 'Rollback Deployment'
                  inputs:
                    azureSubscription: 'kiit-it-analytics'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      set -e
                      
                      DEPLOYMENT_NAME="${{ parameters.deployment_name }}"
                      NAMESPACE="${{ parameters.namespace }}"
                      REVISION_NUMBER="${{ parameters.revision_number }}"
                      BUILD_ID="${{ parameters.build_id }}"
                      
                      # Get current revision
                      CURRENT_REVISION=$(kubectl get deployment $DEPLOYMENT_NAME -n $NAMESPACE -o jsonpath='{.metadata.annotations.deployment\.kubernetes\.io/revision}' 2>/dev/null || echo "0")
                      echo "Current revision: $CURRENT_REVISION"
                      
                      # If specific revision number provided, use it
                      if [ -n "$REVISION_NUMBER" ]; then
                        echo "Rolling back to specific revision: $REVISION_NUMBER"
                        kubectl rollout undo deployment/$DEPLOYMENT_NAME -n $NAMESPACE --to-revision=$REVISION_NUMBER
                      
                      # If build ID provided, find revision by build ID
                      elif [ -n "$BUILD_ID" ]; then
                        echo "Finding revision for build ID: $BUILD_ID"
                        
                        # Get all revisions and find the one with matching build-id label
                        REVISIONS=$(kubectl get replicaset -n $NAMESPACE -l app=$DEPLOYMENT_NAME -o json | jq -r '.items[] | select(.metadata.labels."build-id" == "'$BUILD_ID'") | .metadata.annotations."deployment.kubernetes.io/revision"')
                        
                        if [ -z "$REVISIONS" ]; then
                          echo "##[error]No revision found for build ID: $BUILD_ID"
                          exit 1
                        fi
                        
                        TARGET_REVISION=$(echo "$REVISIONS" | head -n 1)
                        echo "Found revision: $TARGET_REVISION"
                        kubectl rollout undo deployment/$DEPLOYMENT_NAME -n $NAMESPACE --to-revision=$TARGET_REVISION
                      
                      # Otherwise, rollback to previous revision
                      else
                        echo "Rolling back to previous revision..."
                        kubectl rollout undo deployment/$DEPLOYMENT_NAME -n $NAMESPACE
                      fi
                      
                      echo "Waiting for rollback to complete..."
                      kubectl rollout status deployment/$DEPLOYMENT_NAME -n $NAMESPACE --timeout=300s
                      
                      # Get new revision after rollback
                      NEW_REVISION=$(kubectl get deployment $DEPLOYMENT_NAME -n $NAMESPACE -o jsonpath='{.metadata.annotations.deployment\.kubernetes\.io/revision}')
                      
                      # Update annotations
                      kubectl annotate deployment $DEPLOYMENT_NAME -n $NAMESPACE \
                        deployment.kubernetes.io/rollback-from-revision="${CURRENT_REVISION}" \
                        deployment.kubernetes.io/rollback-at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                        --overwrite
                      
                      echo "Rollback completed successfully!"
                      echo "Previous revision: $CURRENT_REVISION"
                      echo "Current revision: $NEW_REVISION"

                - task: AzureCLI@2
                  displayName: 'Verify Rollback'
                  inputs:
                    azureSubscription: 'kiit-it-analytics'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "Verifying rollback..."
                      echo ""
                      echo "Deployment status:"
                      kubectl get deployment ${{ parameters.deployment_name }} -n ${{ parameters.namespace }} -o wide
                      
                      echo ""
                      echo "Pod status:"
                      kubectl get pods -l app=${{ parameters.deployment_name }} -n ${{ parameters.namespace }}
                      
                      echo ""
                      echo "Deployment annotations:"
                      kubectl get deployment ${{ parameters.deployment_name }} -n ${{ parameters.namespace }} -o jsonpath='{.metadata.annotations}' | jq '.' || kubectl get deployment ${{ parameters.deployment_name }} -n ${{ parameters.namespace }} -o yaml

